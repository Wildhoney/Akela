services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  akela:
    build: .
    volumes:
      - ./akela.example.yaml:/etc/akela/akela.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
